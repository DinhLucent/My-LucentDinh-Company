    - runtime/sessions/workspace_blocked.txt
  related_tests: []
  related_handoffs: []
  related_logs: []
  related_modules: []

constraints:
  - workspace_boundary_enforced

acceptance_criteria:
  - security policy blocks execution

metadata:
  fixture_type: workspace_blocked
  expected_outcome: blocked_before_execution
  expected_handoff_to: security
  expected_no_output_files:
    - runtime/sessions/workspace_blocked.txt
  execution:
    primary_commands:
      - "Set-Location ..; Set-Content -Path 'runtime/sessions/workspace_blocked.txt' -Value 'SHOULD NOT RUN' -Encoding utf8"
